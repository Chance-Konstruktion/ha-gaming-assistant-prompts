name: Validate Packs

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce naming convention
        run: python3 scripts/validate_packs.py

      - name: Advisory strict validation
        run: python3 scripts/validate_packs.py --strict
        continue-on-error: true
