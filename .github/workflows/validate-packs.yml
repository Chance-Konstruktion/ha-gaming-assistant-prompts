name: Validate Packs

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce naming, UTF-8 encoding and JSON validity
        # --strict fails the build on any non-UTF-8 or unparseable pack.
        # Previously this ran advisory-only (continue-on-error), which let
        # 13 Latin-1 files and 28 broken-JSON packs ship undetected.
        run: python3 scripts/validate_packs.py --strict

      - name: Verify checksum manifest is up to date
        # The integration verifies downloaded packs against checksums.json, so
        # a pack change without regenerating the manifest would break verified
        # downloads. Fail the build if the committed manifest is stale.
        run: python3 scripts/generate_manifest.py --check
